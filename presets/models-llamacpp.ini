# models.ini for llama-server --models-preset models.ini
# Serves chat + embedding + reranker on a single port

[*]
n-gpu-layers = all
batch-size = 2048
ubatch-size = 2048
load-on-startup = Qwen3-Embedding-0.6B

[Qwen3-Embedding-0.6B]
model = /path/to/Qwen3-Embedding-0.6B-Q8_0.gguf
embedding = true
pooling = last
ctx-size = 8192

[Qwen3-Reranker-0.6B]
model = /path/to/Qwen3-Reranker-0.6B-Q4_K_M.gguf
reranking = true
pooling = rank
embedding = true
ctx-size = 1024

# Add your chat model below
# [deepseek-v4-flash]
# model = /path/to/DeepSeek-V4-Flash.gguf
# ctx-size = 32768
