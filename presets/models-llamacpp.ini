# models.ini for llama-server --models-preset models.ini
# Serves chat + embedding + reranker on a single port
#
# CPU users: use 0.6B models (sections below)
# GPU users: use 4B models (commented sections at bottom)

[*]
n-gpu-layers = all
batch-size = 2048
ubatch-size = 2048
load-on-startup = Qwen3-Embedding-0.6B

# ── 0.6B models (CPU-friendly, ~1 GB total) ──────────────

[Qwen3-Embedding-0.6B]
model = /path/to/Qwen3-Embedding-0.6B-Q8_0.gguf
embedding = true
pooling = last
ctx-size = 8192

[Qwen3-Reranker-0.6B]
model = /path/to/Qwen3-Reranker-0.6B-Q4_K_M.gguf
reranking = true
pooling = rank
embedding = true
ctx-size = 1024

# ── 4B models (GPU recommended, ~5 GB total) ─────────────
# Uncomment these and comment the 0.6B sections above
# to use the higher-quality 4B models.
# Requires ~6 GB VRAM (Q4_K_M) or ~16 GB VRAM (F16).

# [Qwen3-Embedding-4B]
# model = /path/to/Qwen3-Embedding-4B-Q4_K_M.gguf
# embedding = true
# pooling = last
# ctx-size = 32768

# [Qwen3-Reranker-4B]
# model = /path/to/Qwen3-Reranker-4B-Q4_K_M.gguf
# reranking = true
# pooling = rank
# embedding = true
# ctx-size = 32768

# ── Chat model (add your own) ────────────────────────────

